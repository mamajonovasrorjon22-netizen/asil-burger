<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Asil Burger</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1a1a1a, #2d2a26);
            color: #f5e6d3;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ffb347, #ff7e5e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: bold;
        }
        .sub {
            color: #ffb347;
            font-size: 0.8rem;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .card {
            background: rgba(255,255,240,0.1);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
        }
        .emoji {
            font-size: 2rem;
        }
        .item-name {
            font-weight: bold;
            font-size: 0.9rem;
            margin: 5px 0;
        }
        .price {
            color: #ffb347;
            font-weight: bold;
            font-size: 0.85rem;
        }
        .quantity-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }
        .qty-btn {
            background: #ff7e5e;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .cart-section {
            background: #2a241f;
            border-radius: 20px;
            padding: 15px;
            margin-top: 10px;
        }
        .cart-title {
            font-weight: bold;
            margin-bottom: 10px;
        }
        .cart-items {
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 10px;
            font-size: 0.8rem;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px dashed #ffb34750;
        }
        .total {
            font-weight: bold;
            text-align: right;
            color: #ffb347;
            margin: 10px 0;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 25px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            text-align: center;
            font-size: 0.9rem;
        }
        input::placeholder {
            color: #ffb34780;
        }
        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-location {
            background: #3c6e47;
        }
        .btn-order {
            background: linear-gradient(95deg, #ff7e5e, #ff4d2e);
        }
        footer {
            text-align: center;
            font-size: 0.6rem;
            margin-top: 15px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🍔 ASIL BURGER</div>
        <div class="sub">O'zgacha lazzat, o'zgacha uslub</div>
    </div>

    <div class="menu-grid" id="menuGrid"></div>

    <div class="cart-section">
        <div class="cart-title">🛒 SAVAT</div>
        <div class="cart-items" id="cartItems">Savat bo'sh</div>
        <div class="total" id="totalAmount">0 so'm</div>
        
        <input type="tel" id="phone" placeholder="📞 Telefon raqam: +998 __ ___ __ __">
        
        <div id="locationStatus" style="text-align:center; font-size:0.75rem; color:#ffb347; margin:5px 0;"></div>
        
        <button class="btn btn-location" id="locationBtn">📍 Lokatsiyani yuborish</button>
        <button class="btn btn-order" id="orderBtn">✅ Buyurtma berish</button>
    </div>
    <footer>Asil Burger 2026</footer>

    <script>
        // MAHSULOTLAR
        const MENU = {
            "Gamburger": { price: 25000, emoji: "🍔" },
            "Cheeseburger": { price: 30000, emoji: "🧀" },
            "Fri kartoshka": { price: 12000, emoji: "🍟" },
            "Kola": { price: 7000, emoji: "🥤" },
            "Lavash": { price: 22000, emoji: "🌯" },
            "Hot-dog": { price: 18000, emoji: "🌭" }
        };

        // O'ZGARUVCHILAR
        let cart = {};
        let userLocation = null;
        let locationAddress = null;
        
        // TELEGRAM WEBAPP
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // MENYUNI KO'RSATISH
        function renderMenu() {
            const container = document.getElementById('menuGrid');
            container.innerHTML = '';
            for (const [name, data] of Object.entries(MENU)) {
                container.innerHTML += `
                    <div class="card">
                        <div class="emoji">${data.emoji}</div>
                        <div class="item-name">${name}</div>
                        <div class="price">${data.price.toLocaleString()} so'm</div>
                        <div class="quantity-control">
                            <button class="qty-btn" onclick="changeQty('${name}', -1)">−</button>
                            <span id="qty-${name.replace(/\s/g,'')}">0</span>
                            <button class="qty-btn" onclick="changeQty('${name}', 1)">+</button>
                        </div>
                    </div>
                `;
            }
        }

        // MAHSULOT QO'SHISH/KAMAYTIRISH
        function changeQty(name, delta) {
            let current = cart[name] || 0;
            let newVal = current + delta;
            if (newVal < 0) newVal = 0;
            if (newVal === 0) delete cart[name];
            else cart[name] = newVal;
            
            document.getElementById(`qty-${name.replace(/\s/g,'')}`).innerText = cart[name] || 0;
            updateCart();
        }

        // SAVATNI YANGILASH
        function updateCart() {
            const cartDiv = document.getElementById('cartItems');
            let total = 0;
            
            if (Object.keys(cart).length === 0) {
                cartDiv.innerHTML = 'Savat bo\'sh';
                document.getElementById('totalAmount').innerHTML = '0 so\'m';
                return;
            }
            
            cartDiv.innerHTML = '';
            for (const [item, qty] of Object.entries(cart)) {
                const sum = MENU[item].price * qty;
                total += sum;
                cartDiv.innerHTML += `<div class="cart-item"><span>${MENU[item].emoji} ${item} x${qty}</span><span>${sum.toLocaleString()} so'm</span></div>`;
            }
            document.getElementById('totalAmount').innerHTML = `<strong>Jami: ${total.toLocaleString()} so'm</strong>`;
        }

        // MANZILNI KO'CHA NOMI BILAN OLISH
        async function getAddress(lat, lon) {
            try {
                const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=uz`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data && data.display_name) {
                    let shortAddress = data.display_name.split(',');
                    return shortAddress.slice(0, 3).join(', ');
                }
                return `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
            } catch(e) {
                return `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
            }
        }

        // LOKATSIYA TUGMASI
        document.getElementById('locationBtn').onclick = () => {
            document.getElementById('locationStatus').innerHTML = '⏳ Lokatsiya yuborilmoqda...';
            tg.requestLocation();
        };

        // LOKATSIYA QABUL QILISH
        tg.onEvent('locationSent', async (location) => {
            userLocation = { lat: location.latitude, lon: location.longitude };
            locationAddress = await getAddress(location.latitude, location.longitude);
            document.getElementById('locationStatus').innerHTML = `✅ ${locationAddress}`;
            
            tg.showPopup({
                title: "✅ Manzil qabul qilindi",
                message: locationAddress,
                buttons: [{ type: "ok" }]
            });
        });

        // BUYURTMA BERISH
        document.getElementById('orderBtn').onclick = () => {
            const phone = document.getElementById('phone').value.trim();
            
            if (Object.keys(cart).length === 0) {
                tg.showPopup({ title: "Xatolik", message: "Mahsulot tanlang!" });
                return;
            }
            
            if (!phone || phone.length < 9) {
                tg.showPopup({ title: "Xatolik", message: "Telefon raqam kiriting!" });
                return;
            }
            
            if (!userLocation) {
                tg.showPopup({ title: "Xatolik", message: "Lokatsiya yuboring!" });
                return;
            }
            
            const total = Object.entries(cart).reduce((s, [i,q]) => s + MENU[i].price * q, 0);
            const orderData = {
                cart: cart,
                total: total,
                phone: phone,
                location: userLocation,
                address: locationAddress
            };
            
            tg.sendData(JSON.stringify(orderData));
            tg.close();
        };

        renderMenu();
    </script>
</body>
</html>
