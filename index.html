<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Asil Burger | Interaktiv menyu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1a1a1a, #2d2a26);
            color: #f5e6d3;
            padding: 20px;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            font-size: 2.6rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffb347, #ff7e5e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            color: #ffb347;
            font-size: 0.9rem;
            margin-top: 6px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .card {
            background: rgba(255,255,240,0.08);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 16px 8px;
            text-align: center;
            border: 1px solid rgba(255,165,70,0.3);
        }
        .emoji {
            font-size: 2.8rem;
        }
        .item-name {
            font-weight: 600;
            margin: 8px 0 4px;
        }
        .price {
            color: #ffb347;
            font-weight: bold;
        }
        .quantity-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
        }
        .qty-btn {
            background: #ff7e5e;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .cart-section {
            background: #2a241fe0;
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 18px;
            border: 1px solid #ff9f4a;
        }
        .cart-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .cart-items {
            max-height: 180px;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px dashed #ffb34760;
        }
        .total {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: right;
            color: #ffb347;
        }
        .btn-order {
            background: linear-gradient(95deg, #ff7e5e, #ff4d2e);
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 14px;
            color: white;
            cursor: pointer;
        }
        .loc-btn {
            background: #3c6e47;
            margin-top: 0;
            margin-bottom: 8px;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 20px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🍔 ASIL BURGER</div>
        <div class="sub">O'zgacha lazzat, o'zgacha uslub</div>
    </div>

    <div class="menu-grid" id="menuGrid"></div>

    <div class="cart-section">
        <div class="cart-title">🛒 SAVAT</div>
        <div class="cart-items" id="cartItems"></div>
        <div class="total" id="totalAmount">0 so'm</div>
        <button class="btn-order loc-btn" id="sendLocationBtn">📍 Lokatsiyani yuborish</button>
        <button class="btn-order" id="orderBtn">✅ Buyurtma berish</button>
    </div>
    <footer>Asil Burger 2026 | Interaktiv buyurtma</footer>

    <script>
        const MENU = {
            "Gamburger": { price: 25000, emoji: "🍔" },
            "Cheeseburger": { price: 30000, emoji: "🧀" },
            "Fri kartoshka": { price: 12000, emoji: "🍟" },
            "Kola": { price: 7000, emoji: "🥤" },
            "Lavash": { price: 22000, emoji: "🌯" },
            "Hot-dog": { price: 18000, emoji: "🌭" }
        };

        let cart = {};
        let userLocation = null;
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function renderMenu() {
            const container = document.getElementById('menuGrid');
            if (!container) return;
            container.innerHTML = '';
            for (const [name, data] of Object.entries(MENU)) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="emoji">${data.emoji}</div>
                    <div class="item-name">${name}</div>
                    <div class="price">${data.price.toLocaleString()} so'm</div>
                    <div class="quantity-control">
                        <button class="qty-btn" data-name="${name}" data-delta="-1">−</button>
                        <span class="qty-value" id="qty-${name.replace(/\s/g, '')}">${cart[name] || 0}</span>
                        <button class="qty-btn" data-name="${name}" data-delta="1">+</button>
                    </div>
                `;
                container.appendChild(card);
            }
            attachEvents();
        }

        function attachEvents() {
            document.querySelectorAll('.qty-btn').forEach(btn => {
                btn.removeEventListener('click', qtyHandler);
                btn.addEventListener('click', qtyHandler);
            });
        }

        function qtyHandler(e) {
            const name = e.target.getAttribute('data-name');
            const delta = parseInt(e.target.getAttribute('data-delta'));
            if (!name) return;
            let current = cart[name] || 0;
            let newVal = current + delta;
            if (newVal < 0) newVal = 0;
            if (newVal === 0) delete cart[name];
            else cart[name] = newVal;
            updateDisplay();
        }

        function updateDisplay() {
            for (const name of Object.keys(MENU)) {
                const span = document.getElementById(`qty-${name.replace(/\s/g, '')}`);
                if (span) span.innerText = cart[name] || 0;
            }

            const cartDiv = document.getElementById('cartItems');
            if (!cartDiv) return;
            let total = 0;
            cartDiv.innerHTML = '';
            for (const [item, qty] of Object.entries(cart)) {
                const sum = MENU[item].price * qty;
                total += sum;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `<span>${MENU[item].emoji} ${item} x${qty}</span><span>${sum.toLocaleString()} so'm</span>`;
                cartDiv.appendChild(div);
            }
            if (Object.keys(cart).length === 0) {
                cartDiv.innerHTML = '<div style="text-align:center">Savat bo\'sh</div>';
            }
            const totalSpan = document.getElementById('totalAmount');
            if (totalSpan) totalSpan.innerText = total.toLocaleString() + ' so\'m';
        }

        // Lokatsiya
        const sendBtn = document.getElementById('sendLocationBtn');
        if (sendBtn) {
            sendBtn.onclick = () => {
                tg.requestLocation();
            };
        }

        tg.onEvent('locationSent', (location) => {
            userLocation = { lat: location.latitude, lon: location.longitude };
            tg.showPopup({
                title: "📍 Manzil qabul qilindi",
                message: `${location.latitude.toFixed(4)}, ${location.longitude.toFixed(4)}`,
                buttons: [{ type: "ok" }]
            });
        });

        // Buyurtma
        const orderBtn = document.getElementById('orderBtn');
        if (orderBtn) {
            orderBtn.onclick = () => {
                if (Object.keys(cart).length === 0) {
                    tg.showPopup({ title: "Xatolik", message: "Kamida bitta mahsulot tanlang!", buttons: [{ type: "ok" }] });
                    return;
                }
                if (!userLocation) {
                    tg.showPopup({ title: "Lokatsiya kerak", message: "Yetkazib berish uchun joylashuvingizni yuboring!", buttons: [{ type: "ok" }] });
                    return;
                }
                const total = Object.values(cart).reduce((sum, qty, idx) => sum + Object.values(MENU)[idx].price * qty, 0);
                tg.sendData(JSON.stringify({ cart, total, location: userLocation }));
                tg.close();
            };
        }

        renderMenu();
        updateDisplay();
    </script>
</body>
</html>
