<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Den Market | Do'koningiz</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        .logo {
            font-size: 4rem;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .title {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #ffd89b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            font-size: 0.8rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 25px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 16px 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .emoji {
            font-size: 2.5rem;
        }

        .item-name {
            font-weight: 600;
            font-size: 0.9rem;
            margin: 8px 0 4px;
        }

        .price {
            font-size: 0.85rem;
            color: #ffd89b;
            font-weight: bold;
        }

        .quantity-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }

        .qty-btn {
            background: #fff;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 1.1rem;
            font-weight: bold;
            color: #203a43;
            cursor: pointer;
        }

        .cart-section {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 20px;
            margin-top: 10px;
        }

        .cart-header {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .cart-items {
            max-height: 180px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .total {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-top: 2px solid rgba(255,255,255,0.2);
            font-weight: bold;
        }

        .total-amount {
            color: #ffd89b;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 50px;
            background: rgba(255,255,255,0.9);
            font-size: 0.9rem;
        }

        textarea {
            border-radius: 20px;
            resize: vertical;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd89b, #c7e9fb);
            color: #203a43;
            cursor: pointer;
            margin-top: 10px;
        }

        footer {
            text-align: center;
            font-size: 0.6rem;
            margin-top: 20px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🛍️🏪</div>
        <div class="title">DEN MARKET</div>
        <div class="subtitle">Hamma narsa bor, sifatli va arzon</div>
    </div>

    <div class="menu-grid" id="menuGrid"></div>

    <div class="cart-section">
        <div class="cart-header">🛒 SAVATCHA</div>
        <div class="cart-items" id="cartItems">Savat bo'sh</div>
        <div class="total">
            <span>💰 Jami</span>
            <span class="total-amount" id="totalAmount">0 so'm</span>
        </div>

        <input type="tel" id="phone" placeholder="📞 Telefon raqam">
        <textarea id="address" rows="2" placeholder="📍 Yetkazib berish manzili"></textarea>

        <button class="btn" id="orderBtn">✅ BUYURTMA BERISH</button>
    </div>
    <footer>Den Market 2026 | Sifatli xizmat</footer>

    <script>
        const MENU = {
            "🍞 Non": { price: 4000, emoji: "🍞" },
            "🥛 Sut": { price: 8000, emoji: "🥛" },
            "🧀 Pishloq": { price: 25000, emoji: "🧀" },
            "🥚 Tuxum": { price: 2000, emoji: "🥚" },
            "🍎 Olma": { price: 5000, emoji: "🍎" },
            "🍌 Banan": { price: 8000, emoji: "🍌" }
        };

        let cart = {};
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function renderMenu() {
            const container = document.getElementById('menuGrid');
            container.innerHTML = '';
            for (const [name, data] of Object.entries(MENU)) {
                container.innerHTML += `
                    <div class="card">
                        <div class="emoji">${data.emoji}</div>
                        <div class="item-name">${name}</div>
                        <div class="price">${data.price.toLocaleString()} so'm</div>
                        <div class="quantity-control">
                            <button class="qty-btn" onclick="changeQty('${name}', -1)">−</button>
                            <span id="qty-${name.replace(/\s/g,'')}">${cart[name] || 0}</span>
                            <button class="qty-btn" onclick="changeQty('${name}', 1)">+</button>
                        </div>
                    </div>
                `;
            }
        }

        function changeQty(name, delta) {
            let current = cart[name] || 0;
            let newVal = current + delta;
            if (newVal < 0) newVal = 0;
            if (newVal === 0) delete cart[name];
            else cart[name] = newVal;
            
            document.getElementById(`qty-${name.replace(/\s/g,'')}`).innerText = cart[name] || 0;
            updateCart();
        }

        function updateCart() {
            const cartDiv = document.getElementById('cartItems');
            let total = 0;
            cartDiv.innerHTML = '';
            for (const [item, qty] of Object.entries(cart)) {
                const sum = MENU[item].price * qty;
                total += sum;
                cartDiv.innerHTML += `<div class="cart-item"><span>${MENU[item].emoji} ${item} x${qty}</span><span>${sum.toLocaleString()} so'm</span></div>`;
            }
            if (Object.keys(cart).length === 0) cartDiv.innerHTML = 'Savat bo\'sh';
            document.getElementById('totalAmount').innerHTML = total.toLocaleString() + ' so\'m';
        }

        document.getElementById('orderBtn').onclick = () => {
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            
            if (Object.keys(cart).length === 0) {
                tg.showPopup({ title: "Xatolik", message: "Mahsulot tanlang!" });
                return;
            }
            if (!phone) {
                tg.showPopup({ title: "Xatolik", message: "Telefon raqam kiriting!" });
                return;
            }
            if (!address) {
                tg.showPopup({ title: "Xatolik", message: "Manzil kiriting!" });
                return;
            }
            
            const total = Object.entries(cart).reduce((s, [i,q]) => s + MENU[i].price * q, 0);
            tg.sendData(JSON.stringify({ cart, total, phone, address }));
            tg.close();
        };

        renderMenu();
    </script>
</body>
</html>
