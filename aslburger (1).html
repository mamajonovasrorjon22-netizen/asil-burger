<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Asil Burger | Interaktiv menyu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1a1a1a 0%, #2d2a26 100%);
            color: #f5e6d3;
            padding: 20px;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 5px #ff7e5e; }
            to { text-shadow: 0 0 20px #ff4d2e; }
        }
        .logo {
            font-size: 3rem;
            background: linear-gradient(135deg, #ffb347, #ff7e5e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: bold;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,240,0.1);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255,165,70,0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .card:hover {
            transform: translateY(-6px);
            background: rgba(255,165,70,0.2);
            border-color: #ff9f4a;
        }
        .emoji {
            font-size: 3.5rem;
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.3));
        }
        .item-name {
            font-weight: bold;
            font-size: 1.2rem;
            margin: 8px 0;
        }
        .price {
            color: #ffb347;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .quantity-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
        }
        .qty-btn {
            background: #ff7e5e;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 2px 6px black;
        }
        .qty-btn:active {
            transform: scale(0.92);
        }
        .qty-value {
            font-size: 1.2rem;
            min-width: 30px;
            text-align: center;
        }
        .cart-section {
            background: #2a241f;
            border-radius: 32px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #ff9f4a;
        }
        .cart-title {
            font-size: 1.4rem;
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 15px;
        }
        .cart-items {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #ffb34750;
        }
        .total {
            font-size: 1.3rem;
            font-weight: bold;
            text-align: right;
            color: #ffb347;
        }
        .btn-order {
            background: linear-gradient(95deg, #ff7e5e, #ff4d2e);
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            margin-top: 15px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-order:active {
            transform: scale(0.97);
        }
        .loc-btn {
            background: #3c6e47;
            margin-bottom: 12px;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 30px;
            opacity: 0.7;
        }
        button {
            user-select: none;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🍔 ASIL BURGER</div>
        <p>O‘zgacha lazzat, o‘zgacha uslub</p>
    </div>

    <div class="menu-grid" id="menuGrid"></div>

    <div class="cart-section">
        <div class="cart-title">🛒 SAVAT</div>
        <div class="cart-items" id="cartItems"></div>
        <div class="total" id="totalAmount">0 so‘m</div>
        <button class="btn-order loc-btn" id="sendLocationBtn">📍 Lokatsiyani yuborish</button>
        <button class="btn-order" id="orderBtn">✅ Buyurtma berish</button>
    </div>
    <footer>Asil Burger 2026 | Interaktiv buyurtma</footer>

    <script>
        const MENU = {
            "Gamburger": { price: 25000, emoji: "🍔" },
            "Cheesburger": { price: 30000, emoji: "🧀🍔" },
            "Fri kartoshka": { price: 12000, emoji: "🍟" },
            "Kola": { price: 7000, emoji: "🥤" },
            "Lavash": { price: 22000, emoji: "🌯" },
            "Hot-dog": { price: 18000, emoji: "🌭" }
        };

        let cart = {};
        let userLocation = null;
        let tg = window.Telegram.WebApp;
        tg.expand();  // to‘liq ekran

        function renderMenu() {
            const container = document.getElementById('menuGrid');
            container.innerHTML = '';
            for (const [name, data] of Object.entries(MENU)) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="emoji">${data.emoji}</div>
                    <div class="item-name">${name}</div>
                    <div class="price">${data.price.toLocaleString()} so‘m</div>
                    <div class="quantity-control">
                        <button class="qty-btn" data-item="${name}" data-delta="-1">−</button>
                        <span class="qty-value" id="qty-${name.replace(/\s/g,'')}">${cart[name] || 0}</span>
                        <button class="qty-btn" data-item="${name}" data-delta="1">+</button>
                    </div>
                `;
                container.appendChild(card);
            }
            attachQuantityEvents();
        }

        function attachQuantityEvents() {
            document.querySelectorAll('.qty-btn').forEach(btn => {
                btn.removeEventListener('click', quantityHandler);
                btn.addEventListener('click', quantityHandler);
            });
        }

        function quantityHandler(e) {
            const item = e.target.getAttribute('data-item');
            const delta = parseInt(e.target.getAttribute('data-delta'));
            if (!item) return;
            let current = cart[item] || 0;
            let newVal = current + delta;
            if (newVal < 0) newVal = 0;
            if (newVal === 0) delete cart[item];
            else cart[item] = newVal;
            updateCartDisplay();
            updateItemQtyDisplay(item);
        }

        function updateItemQtyDisplay(item) {
            const span = document.getElementById(`qty-${item.replace(/\s/g,'')}`);
            if (span) span.innerText = cart[item] || 0;
        }

        function updateCartDisplay() {
            const cartContainer = document.getElementById('cartItems');
            let total = 0;
            cartContainer.innerHTML = '';
            for (const [item, qty] of Object.entries(cart)) {
                const price = MENU[item].price;
                const sum = price * qty;
                total += sum;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `<span>${MENU[item].emoji} ${item} x${qty}</span><span>${sum.toLocaleString()} so‘m</span>`;
                cartContainer.appendChild(div);
            }
            if (Object.keys(cart).length === 0) {
                cartContainer.innerHTML = '<div style="text-align:center; opacity:0.6;">Savat bo‘sh</div>';
            }
            document.getElementById('totalAmount').innerText = total.toLocaleString() + ' so‘m';
        }

        // Lokatsiya olish (Telegram WebApp)
        document.getElementById('sendLocationBtn').addEventListener('click', () => {
            tg.sendData(JSON.stringify({ action: "getLocation" }));
            tg.requestLocation();
        });

        // Lokatsiyani saqlash (Telegram WebApp event)
        tg.onEvent('locationSent', (location) => {
            userLocation = { lat: location.latitude, lon: location.longitude };
            tg.showPopup({
                title: "📍 Manzil qabul qilindi",
                message: `Lokatsiyangiz: ${location.latitude.toFixed(4)}, ${location.longitude.toFixed(4)}`,
                buttons: [{ type: "ok" }]
            });
        });

        // Buyurtma berish
        document.getElementById('orderBtn').addEventListener('click', () => {
            if (Object.keys(cart).length === 0) {
                tg.showPopup({ title: "Xatolik", message: "Iltimos, kamida bitta mahsulot tanlang!", buttons: [{ type: "ok" }] });
                return;
            }
            if (!userLocation) {
                tg.showPopup({ title: "Lokatsiya kerak", message: "Yetkazib berish uchun lokatsiyangizni yuboring (yuqoridagi tugma).", buttons: [{ type: "ok" }] });
                return;
            }
            const total = Object.entries(cart).reduce((s, [item, qty]) => s + MENU[item].price * qty, 0);
            const orderData = {
                cart: cart,
                total: total,
                location: userLocation
            };
            tg.sendData(JSON.stringify(orderData));
            tg.close();
        });

        renderMenu();
        updateCartDisplay();
    </script>
</body>
</html>
